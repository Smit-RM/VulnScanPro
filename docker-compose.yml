# VulnScan Pro — full stack: Flask web app + Redis + Celery worker.
#
#   docker compose up --build
#
# The web app enqueues scans to the Celery worker over Redis, and scan progress is
# relayed back to browsers through the Redis Socket.IO message queue. Without this
# stack (i.e. running `python backend_app.py` with no REDIS_URL) the app falls back
# to running scans in a background thread — see dispatch_scan() in backend_app.py.
#
# SECRETS: SECRET_KEY / JWT_SECRET_KEY are read from your shell or a local .env file
# (compose substitutes ${VAR}). Set strong values before any real deployment.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    command: python backend_app.py
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "5000"
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://127.0.0.1:5000,http://localhost:5000
      REQUIRE_EMAIL_VERIFICATION: "0"
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-change-me}
    ports:
      - "5000:5000"
    volumes:
      # Shared SQLite DB between web + worker. For real concurrency set DATABASE_URL
      # to Postgres instead (SQLite tolerates only light multi-writer load).
      - vulnscan-db:/app/instance
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A backend_app.celery_app worker --loglevel=info --pool=threads --concurrency=4
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      REQUIRE_EMAIL_VERIFICATION: "0"
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-change-me}
    volumes:
      - vulnscan-db:/app/instance
    depends_on:
      - redis
      - web

volumes:
  vulnscan-db:
