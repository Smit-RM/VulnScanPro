[pytest]
# Bare `pytest` runs the hermetic security suite only. The live-server smoke
# script (integration_smoke_test.py) and the Playwright e2e suite (tests/e2e)
# both need a running server, so they're excluded from the default run.
# (venv/ is already skipped by pytest's default norecursedirs.)
addopts = -q --ignore=tests/e2e --ignore=integration_smoke_test.py
python_files = test_*.py
